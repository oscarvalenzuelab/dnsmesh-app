name: Release - Android

# Builds the Android universal APK and uploads it to the GH Release
# identified by `inputs.tag`. Called by the orchestrator on every
# `v*` tag push, and also exposed as `workflow_dispatch` so a
# flaky leg can be re-triggered manually without re-running the
# desktop builds.
#
# Alpha policy: the APK is signed with the Android debug keystore (the
# default Tauri/Gradle behavior when no signing config is wired up). It
# installs via sideload (Settings → Install unknown apps), but will not
# pass the Play Store. Real signing comes later when there's a keystore
# secret to wire in.
#
# Runtime caveat: the build only proves the APK *compiles*. DMP's DNS
# UPDATE traffic on port 53 may or may not work inside Android's
# network sandbox; expect to iterate on the SDK side once the first
# APK is in hand.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag the APK attaches to."
        required: true
        type: string
      sdk_ref:
        description: "dnsmesh-rs SHA to pin against."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0-alpha.5)."
        required: true
        type: string
      sdk_ref:
        description: "dnsmesh-rs SHA pin (defaults to .dnsmesh-rs-ref at the tag)."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: release-android-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build (universal APK)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Resolve dnsmesh-rs ref pin
        id: sdk
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.sdk_ref }}" ]; then
            ref="${{ inputs.sdk_ref }}"
          else
            ref="$(tr -d '[:space:]' < .dnsmesh-rs-ref)"
          fi
          if [ -z "$ref" ]; then
            echo "::error::no sdk_ref input and .dnsmesh-rs-ref is empty"
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Pinning dnsmesh-rs to $ref"

      - name: Clone dnsmesh-rs sibling at pinned ref
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/oscarvalenzuelab/dnsmesh-rs.git ../dnsmesh-rs
          git -C ../dnsmesh-rs checkout ${{ steps.sdk.outputs.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Android NDK
        # `nttld/setup-ndk` handles licence acceptance + path export
        # cleanly. Pinned so the build is reproducible across runs;
        # bump deliberately when Tauri or rustc require a newer NDK.
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Export NDK paths
        shell: bash
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install bun deps
        run: bun install --frozen-lockfile

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        # Same pattern as the desktop legs — fetch a prebuilt binary
        # instead of compiling from source.
        run: cargo binstall tauri-cli --version "^2" --no-confirm --locked

      - name: Initialize Android project
        # `gen/android/` is not committed; init regenerates it on every
        # build. Deterministic for the proto. Once we need custom
        # AndroidManifest entries / icons / signing config, commit
        # `gen/android/` and remove this step.
        run: cargo tauri android init

      - name: Build APK (release, all ABIs)
        run: cargo tauri android build --apk

      - name: Overlay committed Android icons
        # Tauri's `android init` (re-run by `cargo tauri android build`)
        # generates a placeholder icon set (turquoise / yellow loop)
        # that has nothing to do with our app icon. We overlay our
        # committed Android icons here, AFTER `cargo tauri android
        # build` has finished its regeneration but BEFORE the proguard
        # workaround's `gradlew :app:assembleUniversalRelease` re-run
        # below — that re-run is what bakes the final APK from the
        # `res/` tree, so the overlaid icons end up shipping.
        #
        # Generated subtrees we don't touch (drawable*, layout, values)
        # are left as-is. The committed icon set mirrors the
        # `mipmap-*` + `mipmap-anydpi-v26` + `values` layout.
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d src-tauri/icons/android ]; then
            echo "::warning::src-tauri/icons/android missing; APK will ship the Tauri placeholder icon"
          else
            cp -R src-tauri/icons/android/* \
              src-tauri/gen/android/app/src/main/res/
            echo "Overlaid icons from src-tauri/icons/android/"
          fi

      - name: Apply wry getId() ProGuard workaround (issue #8)
        # `wry <= 0.55.0`'s `proguard-wry.pro` template is missing
        # `int getId();` for `WryActivity`. R8 strips the Kotlin auto-
        # generated getter, then tao 0.35's JNI bridge calls
        # `activity.getId()` at onActivityCreate, gets NoSuchMethodError,
        # panics, and the app crashes before its first frame.
        #
        # Upstream fix: tauri-apps/wry#1721 (merged 2026-05-04, awaiting
        # release). Until that flows in transitively, patch the rule
        # post-init and force R8 to re-run. Two complications:
        #
        #   1. `cargo tauri android init` (run by `cargo tauri android
        #      build`) regenerates the file from wry's bundled template
        #      every time, so the patch only sticks between init and the
        #      next R8 invocation.
        #   2. Gradle's R8 task does not declare the proguard file as an
        #      input, so editing it in place doesn't invalidate R8's
        #      incremental cache. We have to wipe R8 outputs to force a
        #      re-run.
        #
        # Sequence: patch → wipe R8 + dex outputs → re-run gradle
        # `assembleUniversalRelease`, excluding rust tasks since the
        # `.so`s are already on disk from the previous build step.
        # Once the next wry release lands, delete this whole step.
        shell: bash
        run: |
          set -euo pipefail

          # `-print -quit` avoids the SIGPIPE-on-`find | head` risk
          # under pipefail. Guard the search root so a missing tree
          # surfaces a clear error rather than an opaque empty result.
          if [ ! -d src-tauri/gen/android ]; then
            echo "::error::src-tauri/gen/android missing — Tauri Android init did not run"
            exit 1
          fi
          PROGUARD=$(find src-tauri/gen/android -name "proguard-wry.pro" -path "*/generated/*" -print -quit)
          if [ -z "$PROGUARD" ]; then
            echo "::error::proguard-wry.pro not found under src-tauri/gen/android — Tauri's Android scaffolding may have changed"
            exit 1
          fi
          echo "Patching $PROGUARD"

          if grep -q "int getId();" "$PROGUARD"; then
            echo "::notice::proguard-wry.pro already has 'int getId();' — wry release likely shipped the upstream fix; this workflow step can be removed"
          else
            python3 - "$PROGUARD" <<'PY'
          import pathlib, re, sys
          p = pathlib.Path(sys.argv[1])
          s = p.read_text()
          # Match the WryActivity keep block for any package and insert
          # `int getId();` between `getAppClass(...)` and `getVersion()`,
          # mirroring the position in tauri-apps/wry#1721.
          new, n = re.subn(
              r'(-keep class \S+\.WryActivity \{[^}]*?\n)(\s+java\.lang\.String getVersion\(\);)',
              r'\1  int getId();\n\2',
              s,
              count=1,
              flags=re.DOTALL,
          )
          if n != 1:
              sys.stderr.write("could not locate WryActivity keep block in proguard-wry.pro — wry template shape may have changed\n")
              sys.exit(1)
          p.write_text(new)
          PY
            grep -q "int getId();" "$PROGUARD" || { echo "::error::patch did not apply"; exit 1; }
            echo "Patch applied."
          fi

          # Wipe R8 outputs so the next gradle run actually re-runs R8
          # (Gradle's incremental check misses our edit).
          rm -rf src-tauri/gen/android/app/build/outputs/apk
          rm -rf src-tauri/gen/android/app/build/outputs/mapping
          rm -rf src-tauri/gen/android/app/build/intermediates/dex
          rm -rf src-tauri/gen/android/app/build/intermediates/r8_dex_archive_for_full_bundle

          # Re-run gradle assemble, skipping the rust-build tasks (the
          # `.so` files are already in jniLibs from the prior build).
          # Skipping is required because those tasks invoke `cargo tauri`
          # standalone, which fails outside of the Tauri parent process
          # (it tries to connect to a WebSocket the parent owns).
          (
            cd src-tauri/gen/android
            ./gradlew :app:assembleUniversalRelease \
              -x :app:rustBuildArm64Release \
              -x :app:rustBuildArmRelease \
              -x :app:rustBuildX86_64Release \
              -x :app:rustBuildX86Release \
              --no-daemon --console=plain
          )

          # Sanity-check: confirm getId() landed inside the WryActivity
          # class in the dex. This is the workaround's load-bearing
          # invariant — anything that prevents the check itself from
          # running is treated as a hard failure, not a silent skip.
          DEXDUMP=$(find "$ANDROID_HOME/build-tools" -name dexdump -type f -print -quit 2>/dev/null || true)
          if [ -z "$DEXDUMP" ] || [ ! -x "$DEXDUMP" ]; then
            echo "::error::dexdump not found in $ANDROID_HOME/build-tools — cannot verify the workaround"
            exit 1
          fi
          shopt -s nullglob
          apks=(src-tauri/gen/android/app/build/outputs/apk/universal/release/*-unsigned.apk)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "::error::no universal-release APK produced after re-running gradle"
            exit 1
          fi
          UNIVERSAL="${apks[0]}"
          # Scope the grep to the WryActivity class block so we don't get
          # a false-positive from any other class that defines getId.
          # dexdump emits class descriptor lines with leading spaces
          # ("  Class descriptor  : ..."), so anchor the block-end
          # match with [[:space:]]*. Without that, in_block stays
          # true past WryActivity and a later RustWebView.getId would
          # satisfy the check even if WryActivity.getId was stripped.
          if LC_ALL=C "$DEXDUMP" "$UNIVERSAL" 2>/dev/null | LC_ALL=C awk '
              /Class descriptor.*WryActivity;/         { in_block=1; next }
              in_block && /^[[:space:]]*Class descriptor/ { in_block=0 }
              in_block && /name *: .getId./            { found=1 }
              END { exit !found }
            '; then
            echo "✓ WryActivity.getId() present in dex"
          else
            echo "::error::workaround failed — WryActivity.getId() still missing from dex"
            exit 1
          fi

      - name: Sign APKs with Android debug keystore
        # `cargo tauri android build --apk` produces unsigned release
        # APKs, which Android refuses to install
        # (INSTALL_PARSE_FAILED_NO_CERTIFICATES). Sign with the debug
        # keystore so sideloads at least install. Same alpha policy as
        # the unsigned macOS / Windows builds: install with friction,
        # not Play Store-trusted. Promote to a real signing keystore
        # via secrets when one is wired up.
        shell: bash
        run: |
          set -euo pipefail
          DEBUG_KS="$RUNNER_TEMP/debug.keystore"
          # Generate the debug keystore on the fly so we don't depend on
          # a runner-provided ~/.android setup. Credentials are the
          # well-known public Android debug values.
          keytool -genkeypair -v -keystore "$DEBUG_KS" -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

          # apksigner ships in build-tools; setup-android pins one but
          # doesn't put it on PATH, so resolve it explicitly. Guard
          # the build-tools dir so a `find` over a missing path can't
          # blow up the script before our targeted error fires.
          if [ ! -d "$ANDROID_HOME/build-tools" ]; then
            echo "::error::ANDROID_HOME/build-tools is missing — setup-android did not provision build-tools"
            exit 1
          fi
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f 2>/dev/null | sort -V | tail -n1 || true)"
          if [ -z "$APKSIGNER" ] || [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner not found in $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using $APKSIGNER"

          shopt -s globstar nullglob
          for unsigned in src-tauri/gen/android/app/build/outputs/apk/**/release/*-unsigned.apk; do
            signed="${unsigned%-unsigned.apk}-debug-signed.apk"
            "$APKSIGNER" sign --ks "$DEBUG_KS" --ks-pass pass:android \
              --key-pass pass:android --ks-key-alias androiddebugkey \
              --out "$signed" "$unsigned"
            "$APKSIGNER" verify "$signed"
            echo "Signed: $signed"
            # Drop the unsigned source so the upload step can't pick it
            # up by mistake.
            rm -f "$unsigned"
          done

      - name: Locate signed APKs
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          # Expand directly into an array — `nullglob` makes a
          # non-matching glob expand to zero args, which would have
          # made `ls`-piped-into-array list the cwd and silently pass.
          found=(src-tauri/gen/android/app/build/outputs/apk/**/release/*-debug-signed.apk)
          if [ "${#found[@]}" -eq 0 ]; then
            echo "::error::no signed APKs produced"
            ls -R src-tauri/gen/android/app/build/outputs || true
            exit 1
          fi
          for apk in "${found[@]}"; do
            echo "  $apk"
          done
          echo "found=${#found[@]} APK(s)"

      - name: Upload to GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: false
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/release/*-debug-signed.apk
