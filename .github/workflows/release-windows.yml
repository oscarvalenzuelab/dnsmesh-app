name: Release - Windows

# Builds the Windows x86_64 .msi / .exe bundles, signs with signtool
# when a cert is configured, and uploads to the GH Release identified
# by `inputs.tag`. Called by the orchestrator on every `desktop-v*`
# tag push, and also exposed as `workflow_dispatch` so a flaky leg can
# be re-triggered manually without re-running mac / linux.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag the bundles attach to."
        required: true
        type: string
      sdk_ref:
        description: "dnsmesh-rs SHA to pin against."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. desktop-v0.1.0-alpha.1)."
        required: true
        type: string
      sdk_ref:
        description: "dnsmesh-rs SHA pin (defaults to .dnsmesh-rs-ref at the tag)."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: release-windows-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_AUTHENTICODE_CERT != '' }}
      TARGET: x86_64-pc-windows-msvc
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Resolve dnsmesh-rs ref pin
        id: sdk
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.sdk_ref }}" ]; then
            ref="${{ inputs.sdk_ref }}"
          else
            ref="$(tr -d '[:space:]' < .dnsmesh-rs-ref)"
          fi
          if [ -z "$ref" ]; then
            echo "::error::no sdk_ref input and .dnsmesh-rs-ref is empty"
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Pinning dnsmesh-rs to $ref"

      - name: Clone dnsmesh-rs sibling at pinned ref
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/oscarvalenzuelab/dnsmesh-rs.git ../dnsmesh-rs
          git -C ../dnsmesh-rs checkout ${{ steps.sdk.outputs.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install bun deps
        run: bun install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: x86_64-pc-windows-msvc

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        # Fetch a prebuilt binary instead of compiling from source —
        # cuts ~3-5 min off cold builds (especially big on Windows).
        run: cargo binstall tauri-cli --version "^2" --no-confirm --locked

      - name: Build (cargo tauri build)
        run: cargo tauri build --target x86_64-pc-windows-msvc

      # signtool stamps every produced .msi and .exe so SmartScreen's
      # publisher reputation accumulates across releases.
      - name: Code-sign Windows bundles
        if: env.HAS_WINDOWS_CERT == 'true'
        env:
          WINDOWS_AUTHENTICODE_CERT: ${{ secrets.WINDOWS_AUTHENTICODE_CERT }}
          WINDOWS_AUTHENTICODE_PASS: ${{ secrets.WINDOWS_AUTHENTICODE_PASS }}
        shell: pwsh
        run: |
          $cert = "$env:RUNNER_TEMP\authenticode.pfx"
          [System.IO.File]::WriteAllBytes($cert, [System.Convert]::FromBase64String($env:WINDOWS_AUTHENTICODE_CERT))
          $bundles = @()
          $bundles += Get-ChildItem -Path "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi" -Filter "*.msi" -ErrorAction SilentlyContinue
          $bundles += Get-ChildItem -Path "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis" -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($bundles.Count -eq 0) {
            Write-Host "No Windows bundles produced — skipping signing."
          } else {
            foreach ($b in $bundles) {
              Write-Host "Signing $($b.FullName)"
              signtool sign /f $cert /p $env:WINDOWS_AUTHENTICODE_PASS `
                /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
                $b.FullName
            }
          }
          Remove-Item $cert -Force

      - name: Skip code signing (no cert configured)
        if: env.HAS_WINDOWS_CERT != 'true'
        run: echo "WINDOWS_AUTHENTICODE_CERT unset — shipping unsigned installers."

      - name: Upload to GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
