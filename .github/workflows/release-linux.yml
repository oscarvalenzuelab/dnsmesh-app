name: Release - Linux

# Builds the Linux x86_64 + aarch64 .deb / .rpm / .AppImage bundles and
# uploads them to the GH Release identified by `inputs.tag`. Called by
# the orchestrator on every `v*` tag push, and also exposed as
# `workflow_dispatch` so a flaky leg can be re-triggered manually
# without re-running the macOS / Windows builds.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag the bundles attach to."
        required: true
        type: string
      sdk_ref:
        description: "dnsmesh-rs SHA to pin against."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0-alpha.5)."
        required: true
        type: string
      sdk_ref:
        description: "dnsmesh-rs SHA pin (defaults to .dnsmesh-rs-ref at the tag)."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: release-linux-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Resolve dnsmesh-rs ref pin
        id: sdk
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.sdk_ref }}" ]; then
            ref="${{ inputs.sdk_ref }}"
          else
            ref="$(tr -d '[:space:]' < .dnsmesh-rs-ref)"
          fi
          if [ -z "$ref" ]; then
            echo "::error::no sdk_ref input and .dnsmesh-rs-ref is empty"
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Pinning dnsmesh-rs to $ref"

      - name: Clone dnsmesh-rs sibling at pinned ref
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/oscarvalenzuelab/dnsmesh-rs.git ../dnsmesh-rs
          git -C ../dnsmesh-rs checkout ${{ steps.sdk.outputs.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install bun deps
        run: bun install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            xdg-utils

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        # Fetch a prebuilt binary instead of compiling from source —
        # cuts ~3-5 min off cold builds.
        run: cargo binstall tauri-cli --version "^2" --no-confirm --locked

      - name: Build (cargo tauri build)
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload to GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
